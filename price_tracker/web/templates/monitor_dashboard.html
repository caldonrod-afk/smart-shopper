<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Shopper - Real-Time Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .status-bar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4757;
            animation: pulse 2s infinite;
        }

        .status-dot.active {
            background: #2ed573;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #2ed573;
            color: white;
        }

        .btn-danger {
            background: #ff4757;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .add-product-form {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 15px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        .form-group input {
            padding: 12px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .products-list {
            margin-top: 20px;
        }

        .product-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .product-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: #333;
        }

        .product-price {
            background: #2ed573;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        .product-url {
            color: #666;
            font-size: 0.9rem;
            word-break: break-all;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .add-product-form {
                grid-template-columns: 1fr;
            }
            
            .status-bar {
                flex-direction: column;
                gap: 15px;
            }
            
            .controls {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛍️ Smart Shopper</h1>
            <p>Real-Time Price Monitoring Dashboard</p>
            <div style="margin-top: 10px;">
                <a href="http://127.0.0.1:5053/admin" style="color: white; text-decoration: none; background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 15px; font-size: 0.9rem;">🛡️ Admin Dashboard</a>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Monitoring Stopped</span>
            </div>
            <div class="controls">
                <button class="btn btn-primary" id="startBtn" onclick="startMonitoring()">Start Monitoring</button>
                <button class="btn btn-danger" id="stopBtn" onclick="stopMonitoring()">Stop Monitoring</button>
            </div>
        </div>

        <div id="alertContainer"></div>

        <div class="card">
            <h2>Email Configuration</h2>
            <form class="add-product-form" onsubmit="updateReceiverEmail(event)" style="grid-template-columns: 2fr auto; margin-bottom: 20px;">
                <div class="form-group">
                    <label for="receiverEmail">Receiver Email</label>
                    <input type="email" id="receiverEmail" placeholder="your-email@gmail.com" required>
                </div>
                <button type="submit" class="btn btn-primary">Update Email</button>
            </form>
        </div>

        <div class="card">
            <h2>Add New Product</h2>
            <form class="add-product-form" onsubmit="addProduct(event)">
                <div class="form-group">
                    <label for="productUrl">Product URL</label>
                    <input type="url" id="productUrl" placeholder="https://www.amazon.com/dp/..." required>
                </div>
                <div class="form-group">
                    <label for="productName">Product Name</label>
                    <input type="text" id="productName" placeholder="PlayStation 5" required>
                </div>
                <div class="form-group">
                    <label for="alertPrice">Alert Price (₹)</label>
                    <input type="number" id="alertPrice" step="0.01" placeholder="39999" required>
                </div>
                <button type="submit" class="btn btn-primary">Add Product</button>
            </form>
        </div>

        <div class="card">
            <h2>Monitored Products</h2>
            <div class="products-list" id="productsList">
                <p>Loading products...</p>
            </div>
        </div>
    </div>

    <script>
        // Global state
        let isMonitoring = false;

        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', function() {
            loadProducts();
            loadReceiverEmail();
            checkStatus();
            
            // Check status every 10 seconds
            setInterval(checkStatus, 10000);
        });

        function showAlert(message, type = 'success') {
            const alertContainer = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            
            alertContainer.appendChild(alert);
            
            setTimeout(() => {
                alert.remove();
            }, 5000);
        }

        async function loadReceiverEmail() {
            try {
                const response = await fetch('/api/receiver_email');
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('receiverEmail').value = data.receiver_email;
                } else {
                    showAlert('Error loading receiver email: ' + data.error, 'error');
                }
            } catch (error) {
                showAlert('Error loading receiver email: ' + error.message, 'error');
            }
        }

        async function updateReceiverEmail(event) {
            event.preventDefault();
            
            const email = document.getElementById('receiverEmail').value;

            try {
                const response = await fetch('/api/update_receiver_email', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        receiver_email: email
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    showAlert('Receiver email updated successfully!');
                } else {
                    showAlert('Error updating receiver email: ' + data.error, 'error');
                }
            } catch (error) {
                showAlert('Error updating receiver email: ' + error.message, 'error');
            }
        }

        async function loadProducts() {
            try {
                const response = await fetch('/api/products');
                const data = await response.json();
                
                if (data.success) {
                    displayProducts(data.products);
                } else {
                    showAlert('Error loading products: ' + data.error, 'error');
                }
            } catch (error) {
                showAlert('Error loading products: ' + error.message, 'error');
            }
        }

        function displayProducts(products) {
            const productsList = document.getElementById('productsList');
            
            if (products.length === 0) {
                productsList.innerHTML = '<p>No products added yet. Add some products to start monitoring!</p>';
                return;
            }

            productsList.innerHTML = products.map(product => `
                <div class="product-item">
                    <div class="product-header">
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">Alert: ₹${product.warn_price}</div>
                    </div>
                    <div class="product-url">${product.url}</div>
                </div>
            `).join('');
        }

        async function addProduct(event) {
            event.preventDefault();
            
            const url = document.getElementById('productUrl').value;
            const name = document.getElementById('productName').value;
            const price = document.getElementById('alertPrice').value;

            try {
                const response = await fetch('/api/add_product', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        url: url,
                        name: name,
                        warn_price: parseFloat(price)
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    showAlert('Product added successfully!');
                    document.getElementById('productUrl').value = '';
                    document.getElementById('productName').value = '';
                    document.getElementById('alertPrice').value = '';
                    loadProducts();
                } else {
                    showAlert('Error adding product: ' + data.error, 'error');
                }
            } catch (error) {
                showAlert('Error adding product: ' + error.message, 'error');
            }
        }

        async function startMonitoring() {
            try {
                const response = await fetch('/api/start_monitoring', {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert('Monitoring started successfully!');
                    checkStatus();
                } else {
                    showAlert('Error starting monitoring: ' + data.error, 'error');
                }
            } catch (error) {
                showAlert('Error starting monitoring: ' + error.message, 'error');
            }
        }

        async function stopMonitoring() {
            try {
                const response = await fetch('/api/stop_monitoring', {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert('Monitoring stopped successfully!');
                    checkStatus();
                } else {
                    showAlert('Error stopping monitoring: ' + data.error, 'error');
                }
            } catch (error) {
                showAlert('Error stopping monitoring: ' + error.message, 'error');
            }
        }

        async function checkStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                if (data.success) {
                    updateStatus(data.monitoring);
                }
            } catch (error) {
                console.error('Error checking status:', error);
            }
        }

        function updateStatus(monitoring) {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');

            if (monitoring) {
                statusDot.classList.add('active');
                statusText.textContent = 'Monitoring Active';
                startBtn.disabled = true;
                stopBtn.disabled = false;
            } else {
                statusDot.classList.remove('active');
                statusText.textContent = 'Monitoring Stopped';
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        }
    </script>
</body>
</html>
